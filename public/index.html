<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Real-time outreach dashboard powered by Google Sheets. Track messages by person and time.">
  <title>Outreach Dashboard — Fourfront AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.js"></script>
</head>
<body>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading dashboard…</div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <span class="logo">fourFront<span class="logo-dot">.ai</span></span>
      <div class="header-divider"></div>
      <span class="header-title">Outreach Dashboard</span>
    </div>
    <div class="header-right">
      <div class="live-badge">
        <span class="live-dot"></span>
        <span id="lastUpdated">Connecting…</span>
      </div>
      <select id="tzSelect" class="header-select" onchange="changeTimezone()">
        <option value="Asia/Kolkata">IST</option>
        <option value="UTC">UTC</option>
        <option value="America/New_York">EST</option>
        <option value="America/Los_Angeles">PST</option>
        <option value="Europe/London">GMT</option>
        <option value="Asia/Tokyo">JST</option>
      </select>
      <button class="header-btn" onclick="shareView()" title="Share">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
      </button>
      <div class="theme-toggle" onclick="toggleTheme()" tabindex="0" role="switch" aria-label="Toggle theme">
        <div class="theme-toggle-knob"></div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main">

    <!-- Filter Bar -->
    <div class="filter-bar">
      <div class="filter-section">
        <span class="filter-label">Team</span>
        <div class="filter-chips" id="personChips"></div>
      </div>
      <div class="filter-divider"></div>
      <div class="filter-section">
        <span class="filter-label">Period</span>
        <div class="preset-btns">
          <button class="preset-btn active" data-preset="all" onclick="setPreset('all',this)">All</button>
          <button class="preset-btn" data-preset="today" onclick="setPreset('today',this)">Today</button>
          <button class="preset-btn" data-preset="week" onclick="setPreset('week',this)">Week</button>
          <button class="preset-btn" data-preset="month" onclick="setPreset('month',this)">Month</button>
          <button class="preset-btn" data-preset="custom" onclick="setPreset('custom',this)">Custom</button>
        </div>
        <input type="date" class="date-input" id="dateStart" onchange="onDateChange()" style="display:none">
        <input type="date" class="date-input" id="dateEnd" onchange="onDateChange()" style="display:none">
      </div>
      <div class="filter-divider"></div>
      <div class="filter-section">
        <div class="search-wrap">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" class="search-input" id="searchInput" placeholder="Search messages…" oninput="onSearchInput()">
        </div>
      </div>
      <button class="reset-btn" onclick="resetFilters()" title="Reset all filters">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 105.34-12.93L1 10"/></svg>
      </button>
    </div>

    <!-- KPI Cards -->
    <div class="kpi-row">
      <div class="kpi-card">
        <div class="kpi-icon">📨</div>
        <div class="kpi-content">
          <div class="kpi-value" id="kpiTotal">—</div>
          <div class="kpi-label">Total Messages</div>
          <div class="kpi-sub" id="kpiTotalSub"></div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon">👤</div>
        <div class="kpi-content">
          <div class="kpi-value" id="kpiPerson">—</div>
          <div class="kpi-label" id="kpiPersonLabel">All People</div>
          <div class="kpi-sub" id="kpiPersonSub"></div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon">📅</div>
        <div class="kpi-content">
          <div class="kpi-value" id="kpiToday">—</div>
          <div class="kpi-label">Today</div>
          <div class="kpi-sub" id="kpiTodaySub"></div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon">⚡</div>
        <div class="kpi-content">
          <div class="kpi-value" id="kpiAvg">—</div>
          <div class="kpi-label">Avg / Day</div>
          <div class="kpi-sub" id="kpiAvgSub"></div>
        </div>
      </div>
    </div>

    <!-- Charts Row -->
    <div class="charts-row">
      <!-- Time Series -->
      <div class="card card-wide">
        <div class="card-header">
          <span class="card-title">Messages Over Time</span>
          <div class="gran-toggle">
            <button class="gran-btn" data-gran="hour" onclick="setGranularity('hour',this)">H</button>
            <button class="gran-btn active" data-gran="day" onclick="setGranularity('day',this)">D</button>
            <button class="gran-btn" data-gran="week" onclick="setGranularity('week',this)">W</button>
            <button class="gran-btn" data-gran="month" onclick="setGranularity('month',this)">M</button>
          </div>
        </div>
        <div class="chart-container" style="height:280px">
          <canvas id="timeSeriesChart"></canvas>
        </div>
      </div>
      <!-- People -->
      <div class="card card-narrow">
        <div class="card-header">
          <span class="card-title">Team Breakdown</span>
        </div>
        <div class="chart-container" style="height:280px">
          <canvas id="peopleChart"></canvas>
        </div>
      </div>
    </div>

    <!-- Second Charts Row -->
    <div class="charts-row">
      <!-- Heatmap -->
      <div class="card card-wide">
        <div class="card-header">
          <span class="card-title">Activity Heatmap</span>
        </div>
        <div id="heatmapContainer" style="overflow-x:auto;padding:12px 0"></div>
      </div>
      <!-- Hour Distribution -->
      <div class="card card-narrow">
        <div class="card-header">
          <span class="card-title">Active Hours</span>
        </div>
        <div class="chart-container" style="height:200px">
          <canvas id="hourChart"></canvas>
        </div>
      </div>
    </div>

    <!-- Table -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Recent Messages</span>
        <div class="table-actions">
          <span class="table-count" id="tableInfo"></span>
          <button class="export-btn" onclick="exportData('csv')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            CSV
          </button>
          <button class="export-btn" onclick="exportData('xlsx')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            XLSX
          </button>
        </div>
      </div>
      <div class="table-wrap">
        <table class="data-table" id="dataTable">
          <thead>
            <tr>
              <th onclick="sortTable('timestamp')">Timestamp ↕</th>
              <th onclick="sortTable('person')">Person ↕</th>
              <th>Link</th>
              <th>Message</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="table-footer">
        <button class="page-btn" id="prevPage" onclick="changePage(-1)">← Prev</button>
        <span class="page-info" id="pageInfo"></span>
        <button class="page-btn" id="nextPage" onclick="changePage(1)">Next →</button>
      </div>
    </div>

  </main>

  <script src="/utils.js"></script>
  <script src="/app.js"></script>
</body>
</html>
